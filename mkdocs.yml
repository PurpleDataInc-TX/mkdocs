site_name: CloudPi Docs
site_url: https://doc.cloudpi.ai
theme:
  name: material
  custom_dir: custom_theme
  logo: images/cp-logo.png
  favicon: images/favicon.png

  font:
    text: Poppins
    code: Roboto Mono

  features:
    # Navigation
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer

    # Table of Contents
    - toc.follow

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

    # Announce
    - announce.dismiss

  language: en

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang: en
      pipeline:
        - stemmer
        - stopWordFilter
        - trimmer

  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - custom-skip-class-name
      auto_caption: false
      caption_position: bottom

  - tags

  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

  # Social cards plugin disabled - requires cairo system library
  # To enable: brew install cairo pango gdk-pixbuf libffi
  # - social:
  #     cards: true
  #     cards_layout_options:
  #       background_color: "#7c4dff"
  #       color: "#ffffff"

nav:
  - Get Started:
      - Overview: index.md
      - Introduction: Introduction.md
      - Getting Started: GettingStarted.md
      - Landing Page: homepage.md
      - Dashboards: Dashboards.md
      - Navigation Guide: navigation-guide.md
  - Cloud Integration:
      - Provider Connections: ProviderConnections.md
      - Cloud Onboarding: CloudOnboarding.md
      - Connect Cloud Providers:
          - Connect AWS: ConnectAWS.md
          - Connect Azure: ConnectAzure.md
          - Connect GCP: ConnectGCP.md
  - Cost Assignment:
      - Cost Assignment: CostAssignment.md
      - Tag Management: TagManagement.md
      - Tag Governance: TagGovernance.md
  - Policies & Workflows:
      - Policies & Workflows: AutomationPolicies.md
      - Policy YAML Sync: PolicyYAMLSync.md
      - Global Policy Settings: GlobalPolicies.md
  - Cost Management:
      - Billing Hub: MultiCloudBillingHub.md
      - Financials: Financials.md
      - Budgeting: Budgeting.md
      - Forecast: Forecast.md
      - Cost Types: CostTypes.md
  - Optimizations:
      - CloudPi Optimizations: CloudPiOptimisations.md
  - Automation:
      - Automation Overview: AutomationOverview.md
      - Automation: Automations.md
      - VM Scheduler: AutomationVMScheduler.md
      - Scheduler: Scheduler.md
      - Intelligence Automation: IntelligenceAutomation.md
  - Integrations:
      - Integrations: Integrations.md
      - Integrations Catalog: IntegrationsCatalog.md
      - SSO Setup: SSOSetup.md
  - Admin & Security:
      - RBAC: rbac.md
      - Security: security.md
      - User Management: UserManagement.md
      - Service Accounts: ServiceAccounts.md
      - Audit Logging: AuditLogging.md
      - Workspace Settings: workspace.md
      - Admin Settings: AdminSetting.md
      - Alerts & Notifications: AlertsNotifications.md
  - Operations:
      - Task Management: TaskManagement.md
      - Ticketing: Ticketing.md
  - Reference:
      - Troubleshooting: Troubleshooting.md
      - Glossary: Glossary.md
      - Tags: tags.md
  - Changelog: Changelog.md


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloudpi-ai
      name: CloudPi on GitHub

    - icon: fontawesome/brands/x-twitter
      link: https://x.com/cloudpi_ai
      name: CloudPi on X (Twitter)

    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/purpledatainc/
      name: CloudPi on LinkedIn

    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@cloudpiai
      name: CloudPi on YouTube

    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/cloudpi_ai/
      name: CloudPi on Instagram

  generator: false

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject
      - manage

  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            <a href="https://github.com/cloudpi-ai/docs/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">opening an issue</a>.

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css
  - stylesheets/custom.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/shortcuts.js

# Build settings
strict: false
use_directory_urls: true

# Repository information (optional, uncomment if using)
# repo_url: https://github.com/cloudpi-ai/docs
# repo_name: cloudpi-ai/docs
# edit_uri: edit/main/docs/

# Hooks (optional, uncomment if you have custom hooks)
# hooks:
#   - hooks/on_page_markdown.py

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true

  - pymdownx.betterem:
      smart_enable: all

  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

  - pymdownx.critic:
      mode: view

  - pymdownx.details

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true

  - pymdownx.inlinehilite

  - pymdownx.keys

  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: cloudpi-ai
      repo: docs

  - pymdownx.smartsymbols

  - pymdownx.snippets:
      base_path: docs
      check_paths: false

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false

copyright: |
  &copy; 2026 <a href="https://cloudpi.ai" target="_blank" rel="noopener">PurpleData Inc DBA Cloudpi</a>
